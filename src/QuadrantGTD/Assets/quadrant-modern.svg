<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="q1Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF3E3E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="q2Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26A69A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="q3Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE66D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD93D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="q4Gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A4FCF;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影滤镜 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="128" cy="128" r="120" fill="#ffffff" filter="url(#shadow)" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- 第一象限 (重要且紧急) - 右上 -->
  <path d="M 128 8 A 120 120 0 0 1 248 128 L 128 128 Z" fill="url(#q1Gradient)" opacity="0.9"/>
  
  <!-- 第二象限 (重要不紧急) - 左上 -->
  <path d="M 8 128 A 120 120 0 0 1 128 8 L 128 128 Z" fill="url(#q2Gradient)" opacity="0.9"/>
  
  <!-- 第三象限 (不重要但紧急) - 左下 -->
  <path d="M 128 248 A 120 120 0 0 1 8 128 L 128 128 Z" fill="url(#q3Gradient)" opacity="0.9"/>
  
  <!-- 第四象限 (不重要不紧急) - 右下 -->
  <path d="M 248 128 A 120 120 0 0 1 128 248 L 128 128 Z" fill="url(#q4Gradient)" opacity="0.9"/>
  
  <!-- 中央分割线 -->
  <line x1="128" y1="20" x2="128" y2="236" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <line x1="20" y1="128" x2="236" y2="128" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  
  <!-- 中央焦点 -->
  <circle cx="128" cy="128" r="12" fill="#ffffff" stroke="#333333" stroke-width="2"/>
  <circle cx="128" cy="128" r="6" fill="#333333"/>
  
  <!-- 象限标识 -->
  <text x="188" y="68" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="68" y="68" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">2</text>
  <text x="68" y="188" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">3</text>
  <text x="188" y="188" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">4</text>
</svg>